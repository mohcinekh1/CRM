# Versionné : aucun secret (mot de passe BDD, mail, clé JWT → application-local.properties)
# ===============================
# BASE DE DONNÉES
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_crm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SQL INIT
# ===============================
spring.sql.init.mode=always
spring.sql.init.platform=mysql

# ===============================
# MAIL (Gmail SMTP) — login / mot de passe en local uniquement
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# OLLAMA / SPRING AI
# ===============================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=mistral
spring.ai.ollama.chat.options.temperature=0.7

# ===============================
# JWT — durée seulement ici ; app.jwt.secret obligatoire dans application-local.properties
# ===============================
app.jwt.expiration=86400000

# ===============================
# PROFIL ACTIF (local = charge application-local.properties)
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
